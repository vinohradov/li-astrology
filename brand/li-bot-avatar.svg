<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5d98f"/>
      <stop offset="55%" stop-color="#e8c987"/>
      <stop offset="100%" stop-color="#c9a25a"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#2b1645"/>
      <stop offset="60%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#100620"/>
    </radialGradient>
    <mask id="moonMask">
      <rect x="0" y="0" width="512" height="512" fill="white"/>
      <circle cx="330" cy="213" r="139" fill="black"/>
    </mask>
  </defs>

  <!-- Circular background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Outer zodiac ring -->
  <circle cx="256" cy="256" r="234" fill="none" stroke="url(#gold)" stroke-width="9.6" opacity="0.55"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="192" fill="none" stroke="url(#gold)" stroke-width="6.4" opacity="0.35"/>

  <!-- Crescent moon -->
  <circle cx="235" cy="256" r="117" fill="url(#gold)" mask="url(#moonMask)"/>

  <!-- Star -->
  <g transform="translate(352 149)">
    <path d="M0 -34 L9.6 -9.6 L34 0 L9.6 9.6 L0 34 L-9.6 9.6 L-34 0 L-9.6 -9.6 Z" fill="url(#gold)"/>
  </g>

  <!-- 12 zodiac tick marks -->
  <g stroke="url(#gold)" stroke-width="5.3" opacity="0.4">
    <line x1="256" y1="42.67" x2="256" y2="64"/>
    <line x1="363" y1="71.33" x2="352" y2="89.8"/>
    <line x1="440.67" y1="149" x2="422.2" y2="160"/>
    <line x1="469.33" y1="256" x2="448" y2="256"/>
    <line x1="440.67" y1="363" x2="422.2" y2="352"/>
    <line x1="363" y1="440.67" x2="352" y2="422.2"/>
    <line x1="256" y1="469.33" x2="256" y2="448"/>
    <line x1="149" y1="440.67" x2="160" y2="422.2"/>
    <line x1="71.33" y1="363" x2="89.8" y2="352"/>
    <line x1="42.67" y1="256" x2="64" y2="256"/>
    <line x1="71.33" y1="149" x2="89.8" y2="160"/>
    <line x1="149" y1="71.33" x2="160" y2="89.8"/>
  </g>
</svg>
